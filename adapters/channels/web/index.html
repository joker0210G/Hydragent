<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hydragent Control UI</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👾</text></svg>">
    <style>
        :root {
            --bg-color: #08050e;
            --sidebar-bg: #0f0b18;
            --panel-bg: rgba(22, 17, 39, 0.6);
            --border-color: rgba(168, 85, 247, 0.2);
            --primary: #a855f7;
            --primary-glow: rgba(168, 85, 247, 0.4);
            --secondary: #3b82f6;
            --success: #10b981;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --font-family: 'Outfit', 'Inter', system-ui, -apple-system, sans-serif;
        }

        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            overflow: hidden;
            background-image: 
                radial-gradient(at 0% 0%, rgba(168, 85, 247, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.15) 0px, transparent 50%);
            height: 100vh;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 24px;
        }

        .sidebar-header {
            font-size: 22px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 36px;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: 0.5px;
        }

        .nav-button {
            background: none;
            border: 1px solid transparent;
            color: var(--text-muted);
            padding: 14px 18px;
            text-align: left;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 12px;
            margin-bottom: 12px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .nav-button:hover, .nav-button.active {
            background-color: var(--panel-bg);
            color: var(--text-main);
            border-color: var(--border-color);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .top-bar {
            height: 75px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            background-color: rgba(15, 11, 24, 0.3);
            backdrop-filter: blur(12px);
        }

        .top-bar h2 {
            font-weight: 600;
            font-size: 20px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 600;
            background-color: rgba(255, 255, 255, 0.05);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-dot.connected { background-color: var(--success); box-shadow: 0 0 10px var(--success); }
        .status-dot.disconnected { background-color: #ef4444; box-shadow: 0 0 10px #ef4444; }
        .status-dot.connecting { background-color: #f59e0b; box-shadow: 0 0 10px #f59e0b; }

        /* Views */
        .view-content {
            flex: 1;
            display: none;
            overflow: hidden;
        }

        .view-content.active {
            display: flex;
            flex-direction: column;
        }

        /* Chat View */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 40px;
            overflow: hidden;
        }

        .messages-list {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-right: 8px;
        }

        .message-bubble {
            max-width: 75%;
            padding: 16px 20px;
            border-radius: 18px;
            line-height: 1.5;
            font-size: 15px;
            animation: fadeIn 0.3s ease;
        }

        .message-bubble.user {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #ffffff;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 20px rgba(168, 85, 247, 0.25);
        }

        .message-bubble.agent {
            align-self: flex-start;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 4px;
        }

        .message-bubble.system {
            align-self: center;
            background-color: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            font-size: 13px;
            padding: 8px 16px;
            border-radius: 20px;
        }

        .input-box {
            display: flex;
            gap: 16px;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 14px;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 16px;
            outline: none;
            padding: 12px 0;
        }

        .send-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .send-btn:hover {
            box-shadow: 0 0 15px var(--primary-glow);
        }

        /* Library View */
        .library-area {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .library-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        .library-card {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .library-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(168, 85, 247, 0.15);
        }

        .card-icon {
            font-size: 28px;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .card-meta {
            font-size: 13px;
            color: var(--text-muted);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <span>👾</span>
            <span>Hydragent</span>
        </div>
        <button class="nav-button active" onclick="switchTab('chat')">
            <span>💬</span>
            <span>Chat</span>
        </button>
        <button class="nav-button" onclick="switchTab('library')">
            <span>📚</span>
            <span>Library</span>
        </button>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <h2 id="view-title">Agent Chat</h2>
            <div class="status-badge">
                <div id="status-dot" class="status-dot disconnected"></div>
                <span id="status-text">Disconnected</span>
            </div>
        </div>

        <!-- Chat View -->
        <div id="view-chat" class="view-content active">
            <div class="chat-area">
                <div id="messages" class="messages-list"></div>
                <div class="input-box">
                    <input type="text" id="chat-input" class="chat-input" placeholder="Type a message..." onkeydown="handleKeyDown(event)">
                    <button class="send-btn" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>

        <!-- Library View -->
        <div id="view-library" class="view-content" style="height: calc(100vh - 75px);">
            <iframe src="/graph.html" style="width: 100%; height: 100%; border: none;"></iframe>
        </div>
    </div>

    <script>
        let ws;
        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('chat-input');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');

        function switchTab(tab) {
            document.querySelectorAll('.nav-button').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.view-content').forEach(view => view.classList.remove('active'));
            
            if (tab === 'chat') {
                document.querySelector('[onclick="switchTab(\'chat\')"]').classList.add('active');
                document.getElementById('view-chat').classList.add('active');
                document.getElementById('view-title').innerText = 'Agent Chat';
            } else {
                document.querySelector('[onclick="switchTab(\'library\')"]').classList.add('active');
                document.getElementById('view-library').classList.add('active');
                document.getElementById('view-title').innerText = 'Knowledge Library';
            }
        }

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;
            
            statusDot.className = 'status-dot connecting';
            statusText.innerText = 'Connecting...';

            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                statusDot.className = 'status-dot connected';
                statusText.innerText = 'Connected';
            };

            ws.onclose = () => {
                statusDot.className = 'status-dot disconnected';
                statusText.innerText = 'Disconnected';
                setTimeout(connectWebSocket, 3000); // Reconnect loop
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'token') {
                        appendToken(data.token);
                    } else if (data.type === 'status') {
                        addSystemMessage(data.status);
                    }
                } catch (e) {
                    console.error('Error parsing message', e);
                }
            };
        }

        function appendToken(token) {
            let lastMessage = messagesEl.lastElementChild;
            if (lastMessage && lastMessage.classList.contains('agent')) {
                lastMessage.innerText += token;
            } else {
                const bubble = document.createElement('div');
                bubble.className = 'message-bubble agent';
                bubble.innerText = token;
                messagesEl.appendChild(bubble);
            }
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function addSystemMessage(text) {
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble system';
            bubble.innerText = text;
            messagesEl.appendChild(bubble);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function sendMessage() {
            const text = inputEl.value.trim();
            if (!text) return;

            // Add user bubble
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble user';
            bubble.innerText = text;
            messagesEl.appendChild(bubble);
            messagesEl.scrollTop = messagesEl.scrollHeight;

            inputEl.value = '';

            if (ws && ws.readyState === WebSocket.OPEN) {
                const payload = {
                    jsonrpc: '2.0',
                    method: 'intent.submit',
                    params: {
                        page_id: 'web-session',
                        channel_id: 'web',
                        user_id: 'web-user',
                        content: text,
                        attachments: [],
                        metadata: {},
                        timestamp: Date.now()
                    },
                    id: 'intent-' + Date.now()
                };
                ws.send(JSON.stringify(payload));
            }
        }

        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // Init connection
        connectWebSocket();
    </script>
</body>
</html>
