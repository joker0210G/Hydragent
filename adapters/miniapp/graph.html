<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hydragent Library Knowledge Graph</title>
    <meta name="description" content="Interactive Library knowledge graph — Shelves, Books, Pages, and Tags visualised as a force-directed graph.">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', sans-serif;
            background: #08070e;
            color: #f1f0f7;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            position: relative;
        }
        
        /* Sidebar Styling */
        #sidebar {
            position: absolute;
            left: 0;
            top: 0;
            width: 380px;
            height: 100vh;
            background: rgba(13, 11, 23, 0.96);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            z-index: 10;
            display: flex;
            flex-direction: column;
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        #sidebar.collapsed {
            transform: translateX(-100%);
        }
        
        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .sidebar-title {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #a855f7, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .sidebar-subtitle {
            font-size: 11px;
            color: #7c7a93;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        
        .search-container {
            padding: 16px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .search-box {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .search-box:focus {
            border-color: #a855f7;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.2);
        }
        
        .filter-section {
            padding: 16px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .section-title {
            font-size: 12px;
            font-weight: 600;
            color: #8c8aa2;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        
        .filter-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }
        
        .filter-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            color: #c1bfd6;
            transition: all 0.2s ease;
        }
        
        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }
        
        .filter-btn.active {
            background: rgba(168, 85, 247, 0.15);
            border-color: rgba(168, 85, 247, 0.4);
            color: #e9d5ff;
        }
        
        .details-container {
            flex-grow: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .empty-details {
            color: #646279;
            font-size: 14px;
            text-align: center;
            margin-top: 40px;
            font-style: italic;
        }
        
        .node-details {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .detail-badge {
            align-self: flex-start;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .badge-shelf { background: rgba(168, 85, 247, 0.2); color: #c084fc; border: 1px solid rgba(168, 85, 247, 0.4); }
        .badge-book { background: rgba(59, 130, 246, 0.2); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.4); }
        .badge-page { background: rgba(16, 185, 129, 0.2); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.4); }
        .badge-tag { background: rgba(245, 158, 11, 0.2); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.4); }
        
        .detail-title {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            line-height: 1.4;
        }
        
        .detail-props-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        
        .detail-props-table th, .detail-props-table td {
            padding: 8px 0;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .detail-props-table th {
            color: #7c7a93;
            font-weight: 500;
            width: 90px;
        }
        
        .detail-props-table td {
            color: #d1d0db;
            word-break: break-word;
        }
        
        .neighbors-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 8px;
        }
        
        .neighbor-item {
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .neighbor-item:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.1);
        }
        
        /* Main Viewport */
        #viewport {
            width: 100%;
            height: 100vh;
            position: relative;
            transition: padding-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding-left: 380px;
        }
        
        #viewport.full-width {
            padding-left: 0;
        }
        
        #canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        /* Floating Toggle Button */
        #sidebar-toggle {
            position: absolute;
            left: 396px;
            top: 24px;
            z-index: 15;
            background: rgba(18, 16, 31, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #sidebar-toggle.collapsed-toggle {
            left: 24px;
        }
        
        /* Floating HUD Controls */
        .hud-panel {
            position: absolute;
            background: rgba(18, 16, 31, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 16px;
            backdrop-filter: blur(12px);
            z-index: 5;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }
        
        #hud-controls {
            top: 24px;
            left: 452px;
            display: flex;
            gap: 8px;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        #sidebar-toggle.collapsed-toggle ~ #viewport #hud-controls {
            left: 80px;
        }
        
        #hud-tuning {
            bottom: 24px;
            right: 24px;
            width: 280px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .tuning-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .tuning-label {
            font-size: 11px;
            color: #8c8aa2;
            display: flex;
            justify-content: space-between;
        }
        
        .tuning-slider {
            width: 100%;
            accent-color: #a855f7;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            cursor: pointer;
        }
        
        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            padding: 10px 16px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }
        
        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #a855f7, #3b82f6);
            border: none;
        }
        
        .btn-primary:hover {
            opacity: 0.9;
        }
        
        /* Node & Link SVG Styling */
        .node {
            cursor: pointer;
            transition: filter 0.2s ease, stroke-width 0.2s ease;
        }
        
        .node-shelf { filter: drop-shadow(0 0 8px rgba(168, 85, 247, 0.6)); }
        .node-book { filter: drop-shadow(0 0 6px rgba(59, 130, 246, 0.5)); }
        .node-page { filter: drop-shadow(0 0 4px rgba(16, 185, 129, 0.4)); }
        .node-tag { filter: drop-shadow(0 0 4px rgba(245, 158, 11, 0.4)); }
        
        .link {
            stroke-opacity: 0.25;
            transition: stroke-opacity 0.2s ease, stroke-width 0.2s ease;
            fill: none;
        }
        
        .link.belongs_to {
            stroke: #3b82f6;
            stroke-dasharray: 4 3;
        }
        
        .link.sits_on {
            stroke: #a855f7;
        }
        
        .link.tag {
            stroke: #f59e0b;
            stroke-opacity: 0.15;
            stroke-dasharray: 2 4;
        }
        
        .link.other {
            stroke: #64748b;
        }
        
        .label {
            fill: #c1bfd6;
            font-size: 11px;
            font-weight: 500;
            pointer-events: none;
            text-shadow: 0 0 6px #08070e, 0 0 3px #08070e;
        }
        
        /* Interactive highlighting states */
        .dimmed {
            opacity: 0.15 !important;
        }
        
        .highlighted-node {
            stroke: #fff !important;
            stroke-width: 3px !important;
        }
        
        .highlighted-link {
            stroke-opacity: 0.8 !important;
            stroke-width: 3px !important;
        }
        
        /* Tooltip style */
        .mini-tooltip {
            position: absolute;
            background: rgba(13, 11, 23, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 12px;
            color: #fff;
            pointer-events: none;
            z-index: 100;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            opacity: 0;
            transition: opacity 0.15s ease;
        }
        
        /* Responsive Overrides */
        @media (max-width: 768px) {
            #sidebar {
                width: 320px;
            }
            #viewport {
                padding-left: 0;
            }
            #sidebar-toggle {
                left: 336px;
            }
            #sidebar-toggle.collapsed-toggle {
                left: 16px;
            }
            #sidebar-toggle.collapsed-toggle ~ #viewport #hud-controls {
                left: 72px;
            }
            #hud-controls {
                left: 72px;
                top: 16px;
            }
            #hud-tuning {
                width: 240px;
                bottom: 16px;
                right: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- Sidebar Toggle Button -->
    <button id="sidebar-toggle" title="Toggle Sidebar">◀</button>

    <!-- Sidebar -->
    <div id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-title">
                <span>📚</span> Hydragent Library
            </div>
            <div class="sidebar-subtitle">Knowledge Graph Explorer</div>
        </div>
        
        <!-- Search -->
        <div class="search-container">
            <input type="text" class="search-box" id="search-input" placeholder="Search nodes or tags...">
        </div>
        
        <!-- Quick Filters -->
        <div class="filter-section">
            <div class="section-title">Node Type Visibility</div>
            <div class="filter-grid">
                <button class="filter-btn active" data-type="shelf">🗄️ Shelves</button>
                <button class="filter-btn active" data-type="book">📘 Books</button>
                <button class="filter-btn active" data-type="page">📄 Pages</button>
                <button class="filter-btn active" data-type="tag">🏷️ Tags</button>
            </div>
        </div>
        
        <!-- Node Details -->
        <div class="details-container" id="details-panel">
            <div class="empty-details">
                Click a node in the graph to view properties, contents, and connected relations.
            </div>
        </div>
    </div>
    
    <!-- Graph Viewport -->
    <div id="viewport">
        <!-- Floating HUD Header Controls -->
        <div class="hud-panel" id="hud-controls">
            <button class="btn btn-primary" onclick="location.reload()">🔄 Refresh Graph</button>
            <button class="btn" id="btn-reset">⬛ Reset View</button>
            <button class="btn" id="btn-tag-toggle">🏷️ Hide Labels</button>
        </div>
        
        <!-- Floating HUD Physics Controls -->
        <div class="hud-panel" id="hud-tuning">
            <div class="section-title">⚙️ Physics Simulation Tuning</div>
            
            <div class="tuning-row">
                <div class="tuning-label">
                    <span>Repulsion (Charge)</span>
                    <span id="val-charge">-350</span>
                </div>
                <input type="range" class="tuning-slider" id="slide-charge" min="-1000" max="-50" value="-350">
            </div>
            
            <div class="tuning-row">
                <div class="tuning-label">
                    <span>Link Distance</span>
                    <span id="val-distance">100</span>
                </div>
                <input type="range" class="tuning-slider" id="slide-distance" min="30" max="300" value="100">
            </div>
            
            <div class="tuning-row">
                <div class="tuning-label">
                    <span>Node Collision</span>
                    <span id="val-collision">12</span>
                </div>
                <input type="range" class="tuning-slider" id="slide-collision" min="2" max="40" value="12">
            </div>
        </div>
        
        <!-- D3 Canvas SVG -->
        <svg id="canvas"></svg>
        
        <!-- Mini floating tooltip -->
        <div id="mini-tooltip" class="mini-tooltip"></div>
    </div>

        function updateGraph() {
            // Apply filtering logic
            const filteredNodes = graphData.nodes.filter(n => {

                const sId = typeof l.source === 'object' ? l.source.id : l.source;
                const tId = typeof l.target === 'object' ? l.target.id : l.target;
                
                if (sId === nodeId) {

            // Dim others, highlight targets

            height = viewportEl.clientHeight;

            sim.force("center", d3.forceCenter(width / 2, height / 2)).alpha(0.2).restart();
        });
    </script>
</body>
</html>
