# Hydragent Model Council — Phase 5 / Track 5.2
#
# 20+ model profiles covering the 8 task types the planner emits.
# Profiles are loaded by `hydragent_model::council::ModelCouncil::load_from_yaml`.
#
# Schema:
#   model_id         — wire-level model id (e.g. for openrouter)
#   provider         — openrouter | custom_openai | ollama
#   context_window   — max context tokens
#   cost_per_1k      — USD per 1k tokens (output-side; conservative)
#   cost_tier        — free | cheap | standard | premium  (used by budget filter)
#   task_tags        — list of task-type tags the profile is good at
#   benchmark        — { task_tag: score 0..1 }  (used as tie-breaker)
#   primary          — true = the council's first-choice fallback for any
#                      unknown task type.  Exactly one profile MUST be primary.
#
# A profile with a primary=true flag is the safety-net fallback when no
# task-tag match exists OR when the budget filter rejects every match.
#
# Task tags MUST match one of the 8 planner `TaskType` variants
# (in snake_case) so the council can route directly from a `DagNode.task_type`.

profiles:
  # ── 1. DeepSeek Coder (cheap, excellent for code) ──────────────────────
  - model_id: "deepseek/deepseek-coder"
    provider: "openrouter"
    context_window: 128_000
    cost_per_1k: 0.00014
    cost_tier: "cheap"
    task_tags: ["code_generation", "review"]
    benchmark:
      code_generation: 0.92
      review: 0.81
      reasoning: 0.70
    primary: false

  # ── 2. Claude 3.5 Sonnet (premium creative + reasoning) ────────────────
